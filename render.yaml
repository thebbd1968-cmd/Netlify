# Douglas Real Estate Systems — Backend Deployment (Render / Fly.io)
# https://render.com/docs/deploy-fastapi
# https://fly.io/docs/

services:
  - type: web
    name: douglas-re-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: VIKTOR_WEBHOOK_URL
        value: ""
      - key: VIKTOR_WEBHOOK_SECRET
        value: ""
      - key: FRONTEND_URL
        fromService:
          type: web
          name: douglas-re-frontend
          property: url
